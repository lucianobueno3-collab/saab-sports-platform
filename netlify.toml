[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

# Node 22: WebSocket nativo exigido pelo @supabase/supabase-js nas Functions
# (Node 20 quebrava com "detected without native WebSocket support").
[build.environment]
  NODE_VERSION = "22"

# pdfjs-dist precisa ficar como node_module externo (não empacotado pelo esbuild)
# para o worker interno (carregado por caminho relativo) resolver na Function.
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pdfjs-dist"]

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://saab-sports-platform.netlify.app"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
